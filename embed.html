<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>YouTube embed</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <iframe id="yt" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  <script>
    (function() {
      var u = new URL(location.href);
      var v = u.searchParams.get('v');
      if (v) {
        document.getElementById('yt').src = 'https://www.youtube-nocookie.com/embed/' + encodeURIComponent(v);
      }
    })();
  </script>
</body>
</html>
